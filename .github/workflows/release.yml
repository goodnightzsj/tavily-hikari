name: Release

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: Commit SHA on main to backfill release for
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  RELEASE_HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare (auto patch + version + tag)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      should_release: ${{ steps.intent.outputs.should_release }}
      bump_level: ${{ steps.intent.outputs.bump_level }}
      release_channel: ${{ steps.intent.outputs.release_channel }}
      pr_number: ${{ steps.intent.outputs.pr_number }}
      pr_url: ${{ steps.intent.outputs.pr_url }}
      release_intent_label: ${{ steps.intent.outputs.release_intent_label }}
      reason: ${{ steps.intent.outputs.reason }}
      version: ${{ steps.tagmeta.outputs.version }}
      tag: ${{ steps.tagmeta.outputs.tag }}
    steps:
      - name: Checkout (workflow_run)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Determine automatic release policy
        id: intent
        shell: bash
        run: |
          {
            echo "should_release=true"
            echo "bump_level=patch"
            echo "release_channel=stable"
            echo "pr_number="
            echo "pr_url="
            echo "release_intent_label=auto:patch"
            echo "reason=release_every_main_push"
          } >> "${GITHUB_OUTPUT}"

      - name: Determine release version/tag (idempotent)
        id: tagmeta
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        env:
          BUMP_LEVEL: ${{ steps.intent.outputs.bump_level }}
          RELEASE_CHANNEL: ${{ steps.intent.outputs.release_channel }}
        run: |
          set -euo pipefail

          # If HEAD already has a channel-matching tag, reuse it to keep reruns idempotent.
          if [[ "${RELEASE_CHANNEL}" == "rc" ]]; then
            existing_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9a-f]{7}$' | head -n1 || true)"
          else
            existing_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          fi
          if [[ -n "${existing_tag}" ]]; then
            tag="${existing_tag}"
            version="${tag#v}"
            echo "reuse existing tag on HEAD: ${tag}"
          else
            base_version="$(bash ./.github/scripts/compute-version.sh --print-version)"
            if [[ "${RELEASE_CHANNEL}" == "rc" ]]; then
              sha="${{ env.RELEASE_HEAD_SHA }}"
              short_sha="${sha:0:7}"
              version="${base_version}-rc.${short_sha}"
            else
              version="${base_version}"
            fi

            tag="v${version}"
            echo "computed version: ${version} (tag ${tag}, channel ${RELEASE_CHANNEL})"
          fi

          if [[ "${RELEASE_CHANNEL}" == "stable" ]]; then
            latest_stable_tag="$(
              git tag -l \
                | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
                | sed -E 's/^v//' \
                | sort -Vu \
                | tail -n1 \
                || true
            )"

            if [[ -n "${latest_stable_tag}" ]]; then
              if [[ -n "${existing_tag}" ]]; then
                if [[ "${version}" != "${latest_stable_tag}" ]]; then
                  echo "existing stable tag '${version}' on HEAD is behind latest stable '${latest_stable_tag}'" >&2
                  exit 1
                fi
              else
                highest="$(printf '%s\n%s\n' "${latest_stable_tag}" "${version}" | sort -V | tail -n1)"
                if [[ "${highest}" != "${version}" || "${version}" == "${latest_stable_tag}" ]]; then
                  echo "computed stable version '${version}' must be greater than latest stable '${latest_stable_tag}'" >&2
                  exit 1
                fi
              fi
            fi
          fi

          echo "APP_EFFECTIVE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure Git user
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag (if missing)
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tagmeta.outputs.tag }}"
          if [[ -z "${tag}" ]]; then
            echo "missing tag output" >&2
            exit 2
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "tag exists: ${tag}"
            exit 0
          fi

          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release prepare"
            echo "- head_sha: ${{ env.RELEASE_HEAD_SHA }}"
            echo "- should_release: ${{ steps.intent.outputs.should_release }}"
            echo "- release_policy: ${{ steps.intent.outputs.release_intent_label }}"
            echo "- bump_level: ${{ steps.intent.outputs.bump_level }}"
            echo "- release_channel: ${{ steps.intent.outputs.release_channel }}"
            echo "- pr: ${{ steps.intent.outputs.pr_number }} (${{ steps.intent.outputs.pr_url }})"
            echo "- reason: ${{ steps.intent.outputs.reason }}"
            echo "- tag: ${{ steps.tagmeta.outputs.tag || '<none>' }}"
            echo "- version: ${{ steps.tagmeta.outputs.version || '<none>' }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-native:
    name: Build and smoke image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout (workflow_run)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Install Rust native dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Build web assets
        working-directory: web
        env:
          VITE_APP_VERSION: ${{ env.APP_EFFECTIVE_VERSION }}
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LOWER=${lower}" >> "$GITHUB_ENV"
          echo "LOCAL_SMOKE_IMAGE=tavily-hikari-release-smoke:${GITHUB_RUN_ID}-${{ matrix.arch }}" >> "$GITHUB_ENV"
          echo "DIGEST_FILE=${RUNNER_TEMP}/release-digests/${{ matrix.arch }}.txt" >> "$GITHUB_ENV"
          echo "image_name_lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local Docker image for MCP billing smoke
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.LOCAL_SMOKE_IMAGE }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}:buildcache-${{ matrix.arch }}

      - name: Build smoke helpers
        run: cargo build --locked --bin mock_tavily

      - name: MCP billing smoke gate
        shell: bash
        run: |
          set -euo pipefail

          MOCK_PORT=58088
          PROXY_PORT=58087
          DATA_DIR="${RUNNER_TEMP}/tavily-hikari-release-smoke-data"
          DB_PATH="${DATA_DIR}/tavily_proxy.db"
          MOCK_LOG="${RUNNER_TEMP}/mock-tavily.log"
          CONTAINER_NAME="tavily-hikari-release-smoke"

          cleanup() {
            docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true
            if [[ -n "${MOCK_PID:-}" ]]; then
              kill "${MOCK_PID}" >/dev/null 2>&1 || true
              wait "${MOCK_PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          mkdir -p "${DATA_DIR}"

          ./target/debug/mock_tavily --bind "0.0.0.0:${MOCK_PORT}" >"${MOCK_LOG}" 2>&1 &
          MOCK_PID=$!

          for _ in {1..50}; do
            if curl -fsS "http://127.0.0.1:${MOCK_PORT}/admin/state" >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl -fsS "http://127.0.0.1:${MOCK_PORT}/admin/state" >/dev/null

          curl -fsS \
            -X POST \
            "http://127.0.0.1:${MOCK_PORT}/admin/keys" \
            -H 'content-type: application/json' \
            -d '{"secret":"tvly-test-key","limit":1000,"remaining":1000}' \
            >/dev/null

          docker run -d --rm \
            --name "${CONTAINER_NAME}" \
            --add-host host.docker.internal:host-gateway \
            -p "127.0.0.1:${PROXY_PORT}:8787" \
            -v "${DATA_DIR}:/srv/app/data" \
            -e TAVILY_API_KEYS=tvly-test-key \
            -e TAVILY_UPSTREAM="http://host.docker.internal:${MOCK_PORT}/mcp" \
            -e TAVILY_USAGE_BASE="http://host.docker.internal:${MOCK_PORT}" \
            -e DEV_OPEN_ADMIN=true \
            -e PROXY_DB_PATH=/srv/app/data/tavily_proxy.db \
            "${LOCAL_SMOKE_IMAGE}" \
            >/dev/null

          for _ in {1..60}; do
            if curl -fsS "http://127.0.0.1:${PROXY_PORT}/health" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:${PROXY_PORT}/health" >/dev/null

          TOKEN_PAYLOAD="$(
            curl -fsS \
              -X POST \
              "http://127.0.0.1:${PROXY_PORT}/api/tokens" \
              -H 'content-type: application/json' \
              -d '{}'
          )"
          export TOKEN_PAYLOAD
          TOKEN="$(python3 - <<'PY'
          import json, os
          payload = json.loads(os.environ["TOKEN_PAYLOAD"])
          print(payload["token"])
          PY
          )"
          TOKEN_ID="$(python3 - <<'PY'
          import os
          token = os.environ["TOKEN_PAYLOAD"]
          payload = __import__("json").loads(token)
          full_token = payload["token"]
          token_id = full_token.removeprefix("th-").split("-", 1)[0]
          print(token_id)
          PY
          )"

          SEARCH_RESPONSE="$(
            curl -fsS \
              -X POST \
              "http://127.0.0.1:${PROXY_PORT}/mcp" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H 'Accept: application/json, text/event-stream' \
              -H 'content-type: application/json' \
              -d '{"jsonrpc":"2.0","id":"release-smoke-search","method":"tools/call","params":{"name":"tavily_search","arguments":{"query":"release smoke gate","search_depth":"advanced"}}}'
          )"
          export SEARCH_RESPONSE
          python3 - <<'PY'
          import json, os
          payload = json.loads(os.environ["SEARCH_RESPONSE"])
          assert payload.get("result"), payload
          PY

          curl -fsS \
            -X POST \
            "http://127.0.0.1:${PROXY_PORT}/mcp" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H 'Accept: application/json, text/event-stream' \
            -H 'content-type: application/json' \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            >/dev/null

          curl -fsS \
            -X POST \
            "http://127.0.0.1:${MOCK_PORT}/admin/force-response" \
            -H 'content-type: application/json' \
            -d '{"http_status":406,"body":{"error":"client must accept both application/json and text/event-stream"},"once":true}' \
            >/dev/null

          CLIENT_ERROR_HTTP="$(
            curl -sS \
              -o /dev/null \
              -w '%{http_code}' \
              -X POST \
              "http://127.0.0.1:${PROXY_PORT}/mcp" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H 'Accept: application/json, text/event-stream' \
              -H 'content-type: application/json' \
              -d '{"jsonrpc":"2.0","id":"release-smoke-406","method":"tools/call","params":{"name":"tavily_search","arguments":{"query":"release smoke client error"}}}'
          )"
          if [[ "${CLIENT_ERROR_HTTP}" != "406" ]]; then
            echo "expected 406 MCP client error, got ${CLIENT_ERROR_HTTP}" >&2
            exit 1
          fi

          curl -fsS \
            -X POST \
            "http://127.0.0.1:${MOCK_PORT}/admin/force-response" \
            -H 'content-type: application/json' \
            -d '{"http_status":429,"body":{"error":"release smoke upstream rate limit"},"once":true}' \
            >/dev/null

          UPSTREAM_ERROR_HTTP="$(
            curl -sS \
              -o /dev/null \
              -w '%{http_code}' \
              -X POST \
              "http://127.0.0.1:${PROXY_PORT}/mcp" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H 'Accept: application/json, text/event-stream' \
              -H 'content-type: application/json' \
              -d '{"jsonrpc":"2.0","id":"release-smoke-429","method":"tools/call","params":{"name":"tavily_search","arguments":{"query":"release smoke upstream error"}}}'
          )"
          if [[ "${UPSTREAM_ERROR_HTTP}" != "429" ]]; then
            echo "expected 429 MCP upstream failure, got ${UPSTREAM_ERROR_HTTP}" >&2
            exit 1
          fi

          python3 - "${DB_PATH}" "${TOKEN_ID}" <<'PY'
          import json
          import pathlib
          import sqlite3
          import sys

          db_path = pathlib.Path(sys.argv[1])
          token_id = sys.argv[2]
          conn = sqlite3.connect(db_path)
          request_rows = conn.execute(
              "SELECT request_body, result_status, failure_kind FROM request_logs WHERE auth_token_id = ? ORDER BY id DESC",
              (token_id,),
          ).fetchall()
          if not request_rows:
              raise SystemExit("missing request_logs row for smoke token")

          success_search_rows = []
          for request_body_raw, result_status, failure_kind in request_rows:
              request_body = json.loads(request_body_raw.decode())
              request_id = request_body.get("id")
              if request_id == "release-smoke-search":
                  success_search_rows.append((request_body, result_status, failure_kind))

          if len(success_search_rows) != 1:
              raise SystemExit(
                  f"expected exactly one successful MCP search request_logs row for smoke token, got {len(success_search_rows)}"
              )

          request_body, result_status, failure_kind = success_search_rows[0]
          if request_body["params"]["arguments"].get("include_usage") is not None:
              raise SystemExit(f"include_usage must not be forwarded for MCP smoke: {request_body}")
          if result_status != "success" or failure_kind is not None:
              raise SystemExit(
                  f"unexpected request_logs outcome for MCP smoke search: result={result_status} failure={failure_kind}"
              )

          token_log_row = conn.execute(
              "SELECT business_credits FROM auth_token_logs WHERE token_id = ? AND request_kind_key = 'mcp:search' AND result_status = 'success' ORDER BY id DESC LIMIT 1",
              (token_id,),
          ).fetchone()
          if token_log_row is None or token_log_row[0] is None or token_log_row[0] <= 0:
              raise SystemExit(f"missing charged credits for smoke token: {token_log_row}")

          month_row = conn.execute(
              "SELECT COALESCE(month_count, 0) FROM auth_token_quota WHERE token_id = ? LIMIT 1",
              (token_id,),
          ).fetchone()
          if month_row is None or month_row[0] < token_log_row[0]:
              raise SystemExit(
                  f"token monthly quota did not increase with billed credits: month_row={month_row} charged={token_log_row}"
              )
          PY

          ADMIN_LOGS_JSON="$(
            curl -fsS "http://127.0.0.1:${PROXY_PORT}/api/logs?page=1&per_page=20"
          )"
          TOKEN_LOGS_NEUTRAL_JSON="$(
            curl -fsS "http://127.0.0.1:${PROXY_PORT}/api/tokens/${TOKEN_ID}/logs/page?page=1&per_page=20&since=0&operational_class=neutral"
          )"
          export ADMIN_LOGS_JSON TOKEN_LOGS_NEUTRAL_JSON
          python3 - <<'PY'
          import json
          import os

          admin_logs = json.loads(os.environ["ADMIN_LOGS_JSON"])
          neutral_token_logs = json.loads(os.environ["TOKEN_LOGS_NEUTRAL_JSON"])

          def find_log(items, predicate, label):
              for item in items:
                  if predicate(item):
                      return item
              raise SystemExit(f"missing {label} in admin logs: {items}")

          items = admin_logs.get("items") or []
          neutral_log = find_log(
              items,
              lambda item: item.get("request_kind_key") == "mcp:notifications/initialized",
              "neutral MCP notification",
          )
          if neutral_log.get("operationalClass") != "neutral":
              raise SystemExit(f"expected neutral operational class, got {neutral_log}")
          if neutral_log.get("requestKindProtocolGroup") != "mcp":
              raise SystemExit(f"expected MCP protocol group, got {neutral_log}")
          if neutral_log.get("requestKindBillingGroup") != "non_billable":
              raise SystemExit(f"expected non-billable MCP notification, got {neutral_log}")

          client_error_log = find_log(
              items,
              lambda item: item.get("failure_kind") == "mcp_accept_406",
              "client_error MCP accept failure",
          )
          if client_error_log.get("operationalClass") != "client_error":
              raise SystemExit(f"expected client_error operational class, got {client_error_log}")

          upstream_error_log = find_log(
              items,
              lambda item: item.get("failure_kind") == "upstream_rate_limited_429",
              "upstream_error MCP rate limit",
          )
          if upstream_error_log.get("operationalClass") != "upstream_error":
              raise SystemExit(f"expected upstream_error operational class, got {upstream_error_log}")

          neutral_items = neutral_token_logs.get("items") or []
          if neutral_token_logs.get("total") != 1 or len(neutral_items) != 1:
              raise SystemExit(f"expected exactly one neutral token log row, got {neutral_token_logs}")
          neutral_token_log = neutral_items[0]
          if neutral_token_log.get("request_kind_key") != "mcp:notifications/initialized":
              raise SystemExit(f"unexpected neutral token log row: {neutral_token_log}")
          if neutral_token_log.get("operationalClass") != "neutral":
              raise SystemExit(f"expected neutral token log operational class, got {neutral_token_log}")
          PY

      - name: Extract metadata labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}

      - name: Build and push Docker image by digest
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}:buildcache-${{ matrix.arch }},mode=max

      - name: Export image digest
        shell: bash
        run: |
          set -euo pipefail
          digest="${{ steps.build-push.outputs.digest }}"
          if [[ -z "${digest}" ]]; then
            echo "missing pushed digest for ${{ matrix.arch }}" >&2
            exit 1
          fi

          mkdir -p "$(dirname "${DIGEST_FILE}")"
          printf '%s\n' "${digest}" > "${DIGEST_FILE}"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: release-digest-${{ matrix.arch }}
          path: ${{ env.DIGEST_FILE }}
          if-no-files-found: error
          overwrite: true

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Native image build (${{ matrix.arch }})"
            echo "- runner: ${{ matrix.runner }}"
            echo "- platform: ${{ matrix.platform }}"
            echo "- version: ${{ env.APP_EFFECTIVE_VERSION }}"
            echo "- digest: ${{ steps.build-push.outputs.digest || '<none>' }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-manifest:
    name: Publish multi-arch manifest (ghcr)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [prepare, docker-native]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read
      packages: write
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LOWER=${lower}" >> "$GITHUB_ENV"
          echo "image_name_lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          pattern: release-digest-*
          path: ${{ runner.temp }}/release-digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}
          tags: |
            type=raw,value=latest,enable=${{ needs.prepare.outputs.release_channel == 'stable' }}
            type=raw,value=v${{ env.APP_EFFECTIVE_VERSION }}

      - name: Create multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAME_LOWER}"
          refs=()
          while IFS= read -r digest_file; do
            digest="$(tr -d '\n' < "${digest_file}")"
            [[ -n "${digest}" ]] || continue
            refs+=("${image}@${digest}")
          done < <(find "${RUNNER_TEMP}/release-digests" -type f -name '*.txt' | sort)

          if [[ "${#refs[@]}" -ne 2 ]]; then
            echo "expected exactly 2 architecture digests, got ${#refs[@]}" >&2
            printf 'refs=%s\n' "${refs[*]}" >&2
            exit 1
          fi

          tag_args=()
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            tag_args+=("-t" "${tag}")
          done <<< "${{ steps.meta.outputs.tags }}"

          if [[ "${#tag_args[@]}" -eq 0 ]]; then
            echo "metadata-action produced no tags" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

      - name: Validate manifest platforms
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            inspect_output="$(docker buildx imagetools inspect "${tag}")"
            printf '%s\n' "${inspect_output}"
            grep -q 'linux/amd64' <<< "${inspect_output}"
            grep -q 'linux/arm64' <<< "${inspect_output}"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Multi-arch manifest"
            echo "- version: ${{ env.APP_EFFECTIVE_VERSION }}"
            echo "- tags:"
            while IFS= read -r tag; do
              [[ -n "${tag}" ]] || continue
              echo "  - ${tag}"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare, docker-manifest]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Create/Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generateReleaseNotes: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          prerelease: ${{ needs.prepare.outputs.release_channel == 'rc' }}
          token: ${{ secrets.GITHUB_TOKEN }}
