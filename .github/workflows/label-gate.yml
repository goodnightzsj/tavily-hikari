name: PR Label Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]

concurrency:
  group: label-gate-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  label-gate:
    name: Release intent label gate
    runs-on: ubuntu-latest
    steps:
      - name: Record automatic release mode
        shell: bash
        run: |
          set -euo pipefail
          echo "Release labels are no longer required."
          echo "Automated releases now run from pushed v* tags instead of every main push."
